name: Build Android APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Cordova globally
        run: npm install -g cordova

      - name: Initialize Android project
        run: |
          mkdir build-dir
          cd build-dir
          cordova create app com.tourgo.app TourGo
          cd app
          cordova platform add android
          # Copy project files into Cordova's www directory
          rm -rf www/*
          cp -r ../../TourGo/* www/ || cp -r ../../* www/ || true
          
          # Inject logo configuration if logo.png exists
          if [ -f "../../logo.png" ]; then
            cp ../../logo.png www/logo.png
            sed -i '/<\/widget>/i \    <icon src="www/logo.png" \/>' config.xml
          elif [ -f "../../TourGo/logo.png" ]; then
            cp "../../TourGo/logo.png" www/logo.png
            sed -i '/<\/widget>/i \    <icon src="www/logo.png" \/>' config.xml
          fi

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Android APK
        run: |
          cd build-dir/app
          cordova build android --device

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TourGo-Android-APK
          path: build-dir/app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
