name: Build Android APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Cordova globally
        run: npm install -g cordova

      - name: Build Web Project (If applicable)
        run: |
          if [ -f "package.json" ]; then
            npm install --legacy-peer-deps || npm install
            npm run build --if-present || true
          fi

      - name: Initialize Android project
        run: |
          mkdir build-dir
          cd build-dir
          cordova create app com.tourgo.app TourGo
          cd app
          cordova platform add android
          
          # Clean Cordova's default template assets
          rm -rf www/*

          # Find where the production index.html lives (checking dist, build, out, or root)
          INDEX_PATH=$(find ../../ -name "index.html" | grep -v "node_modules" | grep -v "build-dir" | head -n 1)
          
          if [ -z "$INDEX_PATH" ]; then
            echo "CRITICAL ERROR: No index.html found anywhere in the repository!"
            exit 1
          fi
          
          # Get the correct folder containing that index.html
          SOURCE_DIR=$(dirname "$INDEX_PATH")
          echo "Targeting web build directory: $SOURCE_DIR"
          
          # Copy every single asset from that folder right into Cordova's assets
          cp -r "$SOURCE_DIR"/* www/
          
          # Fix local asset routing preferences for Android WebView
          sed -i 's/<content src="index.html" \/>/<content src="index.html" \/>\n    <preference name="AndroidInsecureFileModeEnabled" value="true" \/>\n    <preference name="AllowInlineMediaPlayback" value="true" \/>/' config.xml
          
          # Inject logo configuration if logo.png exists anywhere
          LOGO_PATH=$(find ../../ -name "logo.png" | grep -v "node_modules" | head -n 1)
          if [ ! -z "$LOGO_PATH" ]; then
            cp "$LOGO_PATH" www/logo.png
            sed -i '/<\/widget>/i \    <icon src="www/logo.png" \/>' config.xml
          fi

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Android APK
        run: |
          cd build-dir/app
          cordova build android --device

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TourGo-Android-APK
          path: build-dir/app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
