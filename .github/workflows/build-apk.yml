name: Build Android APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Cordova globally
        run: npm install -g cordova

      - name: Build Web Project (If applicable)
        run: |
          if [ -f "package.json" ]; then
            export PUBLIC_URL="./"
            export VITE_BASE_URL="./"
            npm install --legacy-peer-deps || npm install
            npm run build --if-present || true
          fi

      - name: Initialize Android project
        run: |
          mkdir build-dir
          cd build-dir
          cordova create app com.tourgo.app TourGo
          cd app
          cordova platform add android
          
          # Clean default templates safely
          rm -rf www/*

          # Copy production assets or root files
          if [ -d "../../dist" ]; then
            cp -r ../../dist/* www/
          elif [ -d "../../build" ]; then
            cp -r ../../build/* www/
          elif [ -d "../../.next" ]; then
            cp -r ../../.next/* www/
          else
            cp -r ../../* www/ || true
          fi

          # Clear dangerous duplicate folders
          rm -rf www/node_modules
          rm -rf www/build-dir

          # Guarantee core index.html structure exists if missing
          if [ ! -f "www/index.html" ]; then
            cat << 'EOF' > www/index.html
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="utf-8">
              <meta name="viewport" content="initial-scale=1, width=device-width, height=device-height, viewport-fit=cover">
              <title>TourGo</title>
          </head>
          <body>
              <div id="root"></div>
              <div id="app"></div>
              <script type="text/javascript" src="cordova.js"></script>
              <script type="module" src="assets/index.js"></script>
              <script type="text/javascript" src="main.js"></script>
          </body>
          </html>
          EOF
          fi
          
          # FIX: Force Cordova to map assets safely to localhost domain scheme (resolves white screen)
          sed -i 's/<content src="index.html" \/>/<content src="index.html" \/>\n    <preference name="scheme" value="https" \/>\n    <preference name="hostname" value="localhost" \/>\n    <preference name="AndroidInsecureFileModeEnabled" value="true" \/>\n    <preference name="AllowInlineMediaPlayback" value="true" \/>/' config.xml
          
          # FIX: Safely map Logo asset dynamically into the resource index
          LOGO_PATH=$(find ../../ -name "logo.png" | grep -v "node_modules" | head -n 1)
          if [ ! -z "$LOGO_PATH" ]; then
            cp "$LOGO_PATH" www/logo.png
            sed -i '/<\/widget>/i \    <icon src="www/logo.png" \/>' config.xml
          fi

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Android APK
        run: |
          cd build-dir/app
          cordova clean android
          cordova build android --device

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TourGo-Android-APK
          path: build-dir/app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
